<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Sticky Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="#" class="logo">Ani<span>Nav</span></a>
        
        <button class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </button>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="#home">Home</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#work">Work</a></li>
            <li><a href="#contact">Contact</a></li>
            <button class="cta-button">Get Started</button>
        </ul>
    </nav>

    <div class="hero">
        <div>
            <h1>Animated Navbar</h1>
            <p>Scroll down to see the animation effect</p>
        </div>
    </div>

    <div class="content">
        <h2>Features</h2>
        <div class="cards">
            <div class="card">
                <i class="fas fa-bolt"></i>
                <h3>Fast Animation</h3>
                <p>Smooth transitions and effects</p>
            </div>
            <div class="card">
                <i class="fas fa-mobile-alt"></i>
                <h3>Responsive</h3>
                <p>Works on all devices</p>
            </div>
            <div class="card">
                <i class="fas fa-palette"></i>
                <h3>Modern Design</h3>
                <p>Clean and professional look</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
