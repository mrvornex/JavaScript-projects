<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Navbar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #ffffff;
            color: #333;
            min-height: 150vh;
            padding-top: 80px;
        }

        .minimal-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid #f0f0f0;
            padding: 1.5rem 3rem;
            z-index: 1000;
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #333;
            text-decoration: none;
        }

        .logo span {
            font-weight: 400;
        }

        .nav-menu {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            color: #666;
            text-decoration: none;
            font-weight: 300;
            font-size: 0.95rem;
            letter-spacing: 1px;
            padding: 0.5rem 0;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: #333;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: #333;
            transition: width 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-icon {
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .cart-icon:hover {
            color: #333;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #333;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        @media (max-width: 1024px) {
            .minimal-nav {
                padding: 1.5rem 2rem;
            }
            
            .menu-toggle {
                display: block;
            }
            
            .nav-menu {
                position: fixed;
                top: 80px;
                left: 0;
                width: 100%;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(10px);
                flex-direction: column;
                align-items: center;
                padding: 2rem;
                gap: 2rem;
                border-bottom: 1px solid #f0f0f0;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }
            
            .nav-menu.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }
            
            .nav-item {
                width: 100%;
                text-align: center;
            }
            
            .nav-link::after {
                left: 50%;
                transform: translateX(-50%);
            }
        }

        .hero {
            max-width: 800px;
            margin: 6rem auto;
            padding: 0 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .product-card {
            border: 1px solid #f0f0f0;
            padding: 2rem;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #333;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .product-card h3 {
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .product-card .price {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="minimal-nav">
        <div class="nav-content">
            <a href="#" class="logo">MINI<span>MAL</span></a>
            
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Shop</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Journal</a></li>
                <li class="nav-item"><a href="#" class="nav-link">About</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
            </ul>
            
            <div class="nav-actions">
                <div class="cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <h1>Less is More</h1>
        <p>Experience the beauty of simplicity with our minimalist design approach. Clean lines, thoughtful typography, and purposeful whitespace.</p>
    </section>

    <section class="products">
        <div class="product-card">
            <div style="background: #f5f5f5; height: 200px; margin-bottom: 1rem;"></div>
            <h3>Essential Chair</h3>
            <div class="price">$299</div>
        </div>
        <div class="product-card">
            <div style="background: #f5f5f5; height: 200px; margin-bottom: 1rem;"></div>
            <h3>Minimal Desk</h3>
            <div class="price">$499</div>
        </div>
        <div class="product-card">
            <div style="background: #f5f5f5; height: 200px; margin-bottom: 1rem;"></div>
            <h3>Simple Lamp</h3>
            <div class="price">$129</div>
        </div>
    </section>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        const cartIcon = document.querySelector('.cart-icon');

        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            menuToggle.innerHTML = navMenu.classList.contains('active')
                ? '<i class="fas fa-times"></i>'
                : '<i class="fas fa-bars"></i>';
        });

        cartIcon.addEventListener('click', () => {
            alert('Your cart is empty');
        });

        // Close menu on link click
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
            });
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if(target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
