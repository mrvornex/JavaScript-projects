<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Filter & Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛍️ Product Filter & Search</h1>
        
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search products by name..." 
                class="search-input"
            >
            <button class="search-btn">🔍 Search</button>
            <button class="clear-btn">🔄 Clear</button>
        </div>

        <div class="filter-section">
            <h3>Filter by Category:</h3>
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">All Products</button>
                <button class="filter-btn" data-category="electronics">📱 Electronics</button>
                <button class="filter-btn" data-category="clothing">👕 Clothing</button>
                <button class="filter-btn" data-category="books">📚 Books</button>
                <button class="filter-btn" data-category="home">🏠 Home & Kitchen</button>
            </div>
        </div>

        <div class="price-filter">
            <h3>Filter by Price:</h3>
            <div class="price-range">
                <span>Min: $<span id="minPrice">0</span></span>
                <input 
                    type="range" 
                    id="priceRange" 
                    min="0" 
                    max="1000" 
                    value="1000"
                    class="slider"
                >
                <span>Max: $<span id="maxPrice">1000</span></span>
            </div>
        </div>

        <div class="product-count">
            <p>Showing <span id="count">12</span> out of <span id="total">12</span> products</p>
        </div>

        <div class="products-grid" id="productsGrid">
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <p>😞 No products found. Try different search or filter.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
