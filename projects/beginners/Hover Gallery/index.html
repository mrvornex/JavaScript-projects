<!DOCTYPE html>
<html>

<head>
    <title>Hover Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Hover to Expand Gallery</h1>

            <img src="https://picsum.photos/200/300?random=1">

    </div>
    <script src="script.js"></script>
</body>

</html>
