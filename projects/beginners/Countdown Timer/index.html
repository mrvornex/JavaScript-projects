<!DOCTYPE html>
<html>

<head>
    <title>Coming Soon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>We are Coming Soon!</h1>
        <div class="countdown">
            <div class="time-box">
                <div id="days">19</div>
                <div class="label">DAYS</div>
            </div>
            <div class="time-box">
                <div id="hours">04</div>
                <div class="label">HOURS</div>
            </div>
            <div class="time-box">
                <div id="mins">51</div>
                <div class="label">MINS</div>
            </div>
            <div class="time-box">
                <div id="secs">07</div>
                <div class="label">SECS</div>
            </div>
        </div>
        <p id="message">Stay tuned for something amazing!</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
