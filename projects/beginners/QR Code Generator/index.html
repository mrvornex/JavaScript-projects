<!DOCTYPE html>
<html>

<head>
    <title>QR Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-qrcode"></i> QR Code Generator</h1>
        <input type="text" id="text" placeholder="Enter text or URL..." autofocus>
        <button onclick="generate()"><i class="fas fa-bolt"></i> Generate QR</button>
        <div id="qrcode"></div>
        <button onclick="download()" id="downloadBtn" style="display:none;"><i class="fas fa-download"></i> Download
            QR</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
