<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spin Wheel Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Spin & Win</h1>

    <div class="input-box">
      <input id="optionInput" placeholder="Add option">
      <button id="addBtn">ADD</button>
    </div>

    <div class="wheel-wrapper">
      <div class="pointer"></div>
      <canvas id="wheel" width="360" height="360"></canvas>
    </div>

    <button id="spinBtn">SPIN</button>

    <div id="result"></div>

    <div class="history">
      <h3>History</h3>
      <ul id="historyList"></ul>
    </div>
  </div>

  <audio id="spinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-fast-rocket-whoosh-1714.mp3"></audio>
  <audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-win-2016.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
