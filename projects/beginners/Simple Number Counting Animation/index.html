<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Counting Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📈 Number Counting Animation</h1>

    <div class="numbers">
      <div class="number" data-target="1500">0</div>
      <div class="number" data-target="320">0</div>
      <div class="number" data-target="780">0</div>
      <div class="number" data-target="10000">0</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
