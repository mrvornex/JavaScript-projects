<!DOCTYPE html>
<html>

<head>
    <title>Anagram Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🔤 Anagram Checker</h1>
        <input type="text" id="word1" placeholder="Enter first word">
        <input type="text" id="word2" placeholder="Enter second word">
        <button onclick="checkAnagram()">Check Anagram</button>
        <div id="result"></div>
        <div class="examples">
            <p><strong>Examples:</strong> listen/silent, triangle/integral, earth/heart</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
